<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TechNova — Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>
  <body data-usuario-nombre="{{ usuario.nombre }}">
    <!-- Header -->
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="#">TechNova Solutions</a>
        <div class="ml-auto">
          <span id="usuarioNombre" class="text-white mr-3"
            >{{ usuario.nombre }}</span
          >
          <button id="btnLogout" class="btn btn-sm btn-outline-light">
            Cerrar sesión
          </button>
        </div>
      </div>
    </nav>

    <!-- Contenedor principal -->
    <div class="container-fluid mt-4">
      <div class="row">
        <div class="col-12">
          <h1>Panel de Proyectos</h1>
          <button id="btnNuevoProyecto" class="btn btn-primary mb-3">
            + Nuevo Proyecto
          </button>
        </div>
      </div>

      <!-- Lista de proyectos -->
      <div class="row" id="proyectosContainer">
        <!-- Aquí se cargan los proyectos con JavaScript -->
      </div>
    </div>

    <!-- Modal: Nuevo Proyecto -->
    <div class="modal fade" id="modalProyecto" tabindex="-1" role="dialog">
      <div class="modal-dialog" role="document">
        <div class="modal-content">
          <div class="modal-header bg-primary text-white">
            <h5 class="modal-title">Nuevo Proyecto</h5>
            <button
              type="button"
              class="close text-white"
              data-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="formProyecto">
              <div class="form-group">
                <label>Nombre</label>
                <input
                  type="text"
                  id="proyectoNombre"
                  class="form-control"
                  required
                />
              </div>
              <div class="form-group">
                <label>Descripción</label>
                <textarea
                  id="proyectoDescripcion"
                  class="form-control"
                  rows="3"
                ></textarea>
              </div>
              <div class="form-group">
                <label>Fecha de inicio</label>
                <input
                  type="date"
                  id="proyectoFechaInicio"
                  class="form-control"
                  required
                />
              </div>
              <div class="form-group">
                <label>Fecha estimada de fin</label>
                <input type="date" id="proyectoFechaFin" class="form-control" />
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="button"
              id="btnGuardarProyecto"
              class="btn btn-primary"
            >
              Guardar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://code.jquery.com/jquery-3.7.1.js"
      integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
      integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
      crossorigin="anonymous"
    ></script>
    <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  </body>
</html>
