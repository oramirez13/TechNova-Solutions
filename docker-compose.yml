# ══════════════════════════════════════════════════════════════
# docker-compose.yml — TechNova Solutions
# MariaDB en puerto 3307 (para que Laravel use el 3306)
# Flask con Gunicorn en puerto 5000
# ══════════════════════════════════════════════════════════════

services:

  # ── SERVICIO: db (MariaDB 11) ──
  # Base de datos que almacena usuarios, proyectos, sprints, tareas y avances
  db:
    image: mariadb:11
    container_name: technova_db
    restart: unless-stopped
    environment:
      # Contrasena root de MariaDB (solo uso interno del contenedor)
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
      # Base de datos que se crea automaticamente al iniciar
      MARIADB_DATABASE: ${MARIADB_DATABASE}
      # Usuario de la aplicacion (sin permisos root)
      MARIADB_USER: ${MARIADB_USER}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD}
    ports:
      # Puerto 3307 en el host para que Laravel pueda usar el 3306
      - "3307:3306"
    volumes:
      # Volumen para persistir los datos entre reinicios
      - mariadb_data:/var/lib/mysql
      # Cargar schema.sql como script de inicializacion
      # Solo se ejecuta la primera vez que se crea el volumen
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - technova_net
    healthcheck:
      # Verifica que MariaDB este listo para recibir conexiones
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── SERVICIO: web (Flask + Gunicorn) ──
  # Aplicacion web que se comunica con MariaDB a traves de la red interna
  web:
    build: .
    container_name: technova_web
    restart: unless-stopped
    ports:
      # Puerto 5000 en el host para acceder desde el navegador
      - "5000:5000"
    environment:
      # Conexion a MariaDB dentro de Docker
      # "db" es el nombre del servicio, Docker resuelve la IP automaticamente
      TECHNOVA_DB_HOST: db
      TECHNOVA_DB_PORT: "3306"
      TECHNOVA_DB_USER: ${MARIADB_USER}
      TECHNOVA_DB_PASSWORD: ${MARIADB_PASSWORD}
      TECHNOVA_DB_NAME: ${MARIADB_DATABASE}
      # Clave secreta para sesiones Flask (cambiar en produccion)
      TECHNOVA_SECRET_KEY: ${TECHNOVA_SECRET_KEY}
      # Cookies no seguras (solo para desarrollo sin HTTPS)
      TECHNOVA_COOKIE_SECURE: "0"
    depends_on:
      # Espera a que MariaDB este saludable antes de iniciar Flask
      db:
        condition: service_healthy
    networks:
      - technova_net

# ── VOLUMENES ──
# Persiste los datos de MariaDB entre reinicios del contenedor
volumes:
  mariadb_data:

# ── RED ──
# Red privada para comunicacion entre servicios
# Los contenedores se comunican por nombre de servicio ("db", "web")
networks:
  technova_net:
    driver: bridge
